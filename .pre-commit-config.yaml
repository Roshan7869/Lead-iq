repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.5
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: check-yaml
  - repo: local
    hooks:
      - id: frontend-jest
        name: frontend-jest
        entry: npm test -- --runInBand
        language: system
        pass_filenames: false
      - id: backend-pytest
        name: backend-pytest
        entry: uv run --project backend pytest backend/tests -q
        language: system
        pass_filenames: false