services:
  # ── Databases ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: leadiq-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: leadiq-postgres
    environment:
      POSTGRES_DB: leadiq
      POSTGRES_USER: leadiq
      POSTGRES_PASSWORD: leadiq
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leadiq"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ────────────────────────────────────────────────────────────
  backend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.backend
    container_name: leadiq-backend
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql+asyncpg://leadiq:leadiq@postgres:5432/leadiq
      ALLOWED_ORIGINS: '["http://localhost:3000"]'
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ../backend:/app/backend

  # ── Frontend (Next.js) ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.frontend
    container_name: leadiq-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  redis_data:
  postgres_data:
